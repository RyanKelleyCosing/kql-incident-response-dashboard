name: Validate Dashboard

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        shell: pwsh
        run: az bicep install

      - name: Validate workbook and Bicep
        shell: pwsh
        run: ./tests/validate-dashboard.ps1